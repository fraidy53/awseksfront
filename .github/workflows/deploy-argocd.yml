name: Frontend → ArgoCD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Build & Publish Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Frontend Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push
        env:
          ECR: ${{ secrets.ECR_FRONTEND_URI }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR:$TAG" -t "$ECR:latest" .
          docker push "$ECR:$TAG"
          docker push "$ECR:latest"

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: fraidy53/awseksinfra
          token: ${{ secrets.ARGOCD_GIT_TOKEN }}
          path: infra-repo

      - name: Update Manifest
        working-directory: infra-repo
        env:
          IMAGE: ${{ secrets.ECR_FRONTEND_URI }}:${{ github.sha }}
        run: |
          sed -i "s|image:.*|image: ${IMAGE}|g" manifests/frontend/deployment.yaml

      - name: Commit and Push Changes
        working-directory: infra-repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add manifests/frontend/deployment.yaml

          if ! git diff --cached --quiet; then
            git commit -m "chore: update frontend image to ${{ github.sha }} [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

